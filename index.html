<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{--bg:#0a0e14;--s1:#12171f;--s2:#1a2030;--bd:#1e2a3a;--t1:#e2e8f0;--t2:#8892a4;--g:#10b981;--r:#ef4444;--b:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif}
.c{max-width:900px;margin:0 auto;padding:28px 20px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.hd h1{font-size:18px;font-weight:700}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:3px 9px;border-radius:99px;background:rgba(16,185,129,.12);color:var(--g)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);border-radius:10px;overflow:hidden;margin-bottom:20px}
.stat{background:var(--s1);padding:18px}
.stat .l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.stat .v{font-size:22px;font-weight:700;margin-top:3px;letter-spacing:-.5px}
.stat .s{font-size:11px;color:var(--t2);margin-top:2px}
.up{color:var(--g)}.dn{color:var(--r)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:20px}
.card h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:12px}
.tbl{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:20px}
.tbl h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);padding:14px 14px 0}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:10px 14px;background:var(--s2)}
td{padding:10px 14px;font-size:12px;border-top:1px solid var(--bd)}
tr:hover td{background:var(--s2)}
td a{color:var(--b);text-decoration:none}
.r{text-align:right}
.empty{padding:28px;text-align:center;color:var(--t2);font-size:12px}
.ft{text-align:center;padding:20px 0;color:var(--t2);font-size:10px}
.dot{display:inline-block;width:5px;height:5px;background:var(--g);border-radius:50%;margin-right:5px;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}td,th{padding:8px 10px;font-size:11px}}
</style>
</head>
<body>
<div class="c">
  <div class="hd"><h1>Ermis Agent</h1><span class="badge">Live</span></div>
  <div class="stats" id="stats"></div>
  <div class="card"><h2>Portfolio Value</h2><canvas id="chart" height="200"></canvas></div>
  <div class="tbl"><h2>Open Positions</h2><table id="pos"><thead><tr><th>Position</th><th>Market</th><th class="r">Entry</th><th class="r">Now</th><th class="r">P&L</th></tr></thead><tbody></tbody></table></div>
  <div class="ft"><span class="dot"></span><span id="upd">Loading...</span></div>
</div>
<script>
const $=s=>document.querySelector(s),fm=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),pc=n=>(n*100).toFixed(0)+'%';
let ch;
function renderChart(hist){
  const ctx=$('#chart').getContext('2d');
  if(ch)ch.destroy();
  if(hist.length<2){ctx.fillStyle='#8892a4';ctx.font='12px Inter';ctx.textAlign='center';ctx.fillText('Collecting data...',ctx.canvas.width/2,100);return}
  const data=hist.map(h=>({x:new Date(h.t),y:h.total}));
  const col=data[data.length-1].y>=data[0].y?'#10b981':'#ef4444';
  ch=new Chart(ctx,{type:'line',data:{datasets:[{data,borderColor:col,backgroundColor:col+'18',fill:true,tension:.3,pointRadius:0,pointHitRadius:10,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2030',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#1e2a3a',borderWidth:1,padding:8,callbacks:{title:i=>new Date(i[0].parsed.x).toLocaleString(),label:i=>'$'+fm(i.parsed.y)}}},scales:{x:{type:'time',time:{unit:hist.length>100?'hour':'minute',displayFormats:{minute:'HH:mm',hour:'MMM d, ha'}},grid:{display:false},ticks:{color:'#8892a4',font:{size:10}}},y:{grid:{color:'#1e2a3a40'},ticks:{color:'#8892a4',font:{size:10},callback:v=>'$'+fm(v)}}}}});
}
async function load(){
  try{
    const d=await(await fetch('data.json?'+Date.now())).json();
    const up=d.pnl>=0;
    $('#stats').innerHTML=`
      <div class="stat"><div class="l">Portfolio</div><div class="v">$${fm(d.total)}</div><div class="s">Wallet $${fm(d.wallet)} + Positions $${fm(d.open_value)}</div></div>
      <div class="stat"><div class="l">P&L</div><div class="v ${up?'up':'dn'}">${up?'+':''}$${fm(d.pnl)}</div><div class="s">${d.pnl_pct>=0?'+':''}${d.pnl_pct}% from $${fm(d.deposit)}</div></div>
      <div class="stat"><div class="l">Positions</div><div class="v">${d.positions.length}</div><div class="s">$${fm(d.open_value)} deployed</div></div>`;
    renderChart(d.pnl_history||[]);
    const tb=$('#pos tbody');
    if(!d.positions.length){tb.innerHTML='<tr><td colspan="5" class="empty">No open positions</td></tr>'}
    else{tb.innerHTML=d.positions.map(p=>{const u=p.pnl>=0;return`<tr><td style="color:var(--${u?'g':'r'});font-weight:600">${p.side}</td><td>${p.url?`<a href="${p.url}" target="_blank">${p.question}</a>`:p.question}</td><td class="r">${pc(p.entry)}</td><td class="r">${pc(p.current)}</td><td class="r" style="color:var(--${u?'g':'r'});font-weight:600">${u?'+':''}$${fm(p.pnl)}</td></tr>`}).join('')}
    $('#upd').textContent='Updated '+new Date(d.updated).toLocaleString();
  }catch(e){console.error(e)}
}
load();setInterval(load,30000);
</script>
</body>
</html>
