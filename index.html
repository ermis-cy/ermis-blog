<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.c{max-width:400px;width:100%;padding:20px;text-align:center}
h1{font-size:18px;font-weight:700;margin-bottom:24px}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:3px 9px;border-radius:99px;background:rgba(16,185,129,.12);color:#10b981;margin-left:8px}
.val{font-size:36px;font-weight:700;margin:16px 0 4px}
.label{font-size:12px;color:#8892a4}
.sub{font-size:13px;color:#8892a4;margin-top:4px}
.ft{margin-top:24px;font-size:10px;color:#8892a4}
a{color:#3b82f6;text-decoration:none}
</style>
</head>
<body>
<div class="c">
  <h1>Ermis Agent<span class="badge">Live</span></h1>
  <div class="label">WALLET BALANCE</div>
  <div class="val" id="wallet">...</div>
  <div class="sub">Deposit: $<span id="dep">...</span></div>
  <div class="sub" style="margin-top:16px"><a href="https://polymarket.com/portfolio" target="_blank">View full portfolio on Polymarket →</a></div>
  <div class="ft" id="upd"></div>
</div>
<script>
async function load(){
  try{
    const d=await(await fetch('data.json?'+Date.now())).json();
    document.getElementById('wallet').textContent='$'+d.wallet.toLocaleString('en-US',{minimumFractionDigits:2});
    document.getElementById('dep').textContent=d.deposit.toFixed(2);
    document.getElementById('upd').textContent='Updated '+new Date(d.updated).toLocaleString();
  }catch(e){}
}
load();setInterval(load,60000);
</script>
</body>
</html>
