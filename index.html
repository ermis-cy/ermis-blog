<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { color: #f0f6fc; margin-bottom: 4px; font-size: 24px; }
.subtitle { color: #8b949e; margin-bottom: 24px; font-size: 14px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.card .label { color: #8b949e; font-size: 12px; text-transform: uppercase; }
.card .value { color: #f0f6fc; font-size: 22px; font-weight: 600; margin-top: 4px; }
.card .value.green { color: #3fb950; }
.card .value.red { color: #f85149; }
h2 { color: #f0f6fc; font-size: 16px; margin: 20px 0 10px; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: #8b949e; font-weight: 500; padding: 8px 6px; border-bottom: 1px solid #30363d; }
td { padding: 8px 6px; border-bottom: 1px solid #21262d; }
td a { color: #58a6ff; text-decoration: none; }
td a:hover { text-decoration: underline; }
.side { font-weight: 600; }
.side.yes { color: #3fb950; }
.side.no { color: #f85149; }
.result { font-weight: 600; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.result.win { background: #238636; color: #fff; }
.result.loss { background: #da3633; color: #fff; }
.updated { color: #484f58; font-size: 11px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<h1>Ermis Agent</h1>
<p class="subtitle">Autonomous prediction market trader. Paper trading mode.</p>

<div class="cards" id="cards"></div>

<h2>Open Positions</h2>
<table id="positions">
<thead><tr><th>Side</th><th>Market</th><th>Entry</th><th>Size</th></tr></thead>
<tbody></tbody>
</table>

<h2>Resolved Trades</h2>
<table id="resolved">
<thead><tr><th>Result</th><th>Side</th><th>Market</th><th>Entry</th><th>Size</th><th>P&L</th></tr></thead>
<tbody></tbody>
</table>

<h2>Recent Trades</h2>
<table id="trades">
<thead><tr><th>Time</th><th>Side</th><th>Market</th><th>Price</th><th>Size</th></tr></thead>
<tbody></tbody>
</table>

<p class="updated" id="updated"></p>

<script>
async function load() {
  try {
    const resp = await fetch('data.json?' + Date.now());
    const d = await resp.json();

    // Cards
    const pnlClass = d.pnl >= 0 ? 'green' : 'red';
    document.getElementById('cards').innerHTML = `
      <div class="card"><div class="label">Portfolio</div><div class="value">$${d.total_value.toFixed(2)}</div></div>
      <div class="card"><div class="label">P&L</div><div class="value ${pnlClass}">${d.pnl >= 0 ? '+' : ''}$${d.pnl.toFixed(2)}</div></div>
      <div class="card"><div class="label">Record</div><div class="value">${d.wins}W / ${d.losses}L</div></div>
      <div class="card"><div class="label">Cash</div><div class="value">$${d.cash.toFixed(2)}</div></div>
      <div class="card"><div class="label">Invested</div><div class="value">$${d.invested.toFixed(2)}</div></div>
      <div class="card"><div class="label">Trades</div><div class="value">${d.total_trades}</div></div>
    `;

    // Positions
    const posBody = document.querySelector('#positions tbody');
    posBody.innerHTML = d.open_positions.map(p => `<tr>
      <td class="side ${p.side.toLowerCase()}">${p.side}</td>
      <td><a href="${p.url}" target="_blank">${p.question}</a></td>
      <td>${(p.entry * 100).toFixed(0)}%</td>
      <td>$${p.size.toFixed(2)}</td>
    </tr>`).join('');

    // Resolved
    const resBody = document.querySelector('#resolved tbody');
    resBody.innerHTML = d.resolved.map(r => `<tr>
      <td><span class="result ${r.won ? 'win' : 'loss'}">${r.won ? 'WIN' : 'LOSS'}</span></td>
      <td class="side ${r.side.toLowerCase()}">${r.side}</td>
      <td><a href="${r.url}" target="_blank">${r.question}</a></td>
      <td>${(r.entry * 100).toFixed(0)}%</td>
      <td>$${r.size.toFixed(2)}</td>
      <td style="color:${r.pnl >= 0 ? '#3fb950' : '#f85149'}">${r.pnl >= 0 ? '+' : ''}$${r.pnl.toFixed(2)}</td>
    </tr>`).join('');

    // Trades
    const trBody = document.querySelector('#trades tbody');
    trBody.innerHTML = d.recent_trades.slice(0, 20).map(t => `<tr>
      <td>${new Date(t.time).toLocaleString()}</td>
      <td class="side ${t.side.toLowerCase()}">${t.side}</td>
      <td><a href="${t.url}" target="_blank">${t.question}</a></td>
      <td>${(t.price * 100).toFixed(0)}%</td>
      <td>$${t.size.toFixed(2)}</td>
    </tr>`).join('');

    document.getElementById('updated').textContent = 'Updated: ' + new Date(d.updated).toLocaleString();
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

load();
setInterval(load, 60000); // Refresh every minute
</script>
</body>
</html>
