<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.c{max-width:400px;width:100%;padding:20px;text-align:center}
h1{font-size:18px;font-weight:700;margin-bottom:24px}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:3px 9px;border-radius:99px;background:rgba(16,185,129,.12);color:#10b981;margin-left:8px}
.box{background:#12171f;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 16px;border-bottom:1px solid #1e2a3a}
.row:last-child{border-bottom:none}
.row .l{font-size:12px;color:#8892a4}
.row .v{font-size:14px;font-weight:600}
.big .v{font-size:28px;font-weight:700;letter-spacing:-1px}
.up{color:#10b981}.dn{color:#ef4444}
.sub{font-size:13px;color:#8892a4;margin-top:12px}
.ft{margin-top:20px;font-size:10px;color:#8892a4}
a{color:#3b82f6;text-decoration:none}
</style>
</head>
<body>
<div class="c">
  <h1>Ermis Agent<span class="badge">Live</span></h1>
  <div id="content">Loading...</div>
  <div class="sub"><a href="https://polymarket.com/portfolio" target="_blank">View positions on Polymarket →</a></div>
  <div class="ft" id="upd"></div>
</div>
<script>
const fm=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
async function load(){
  try{
    const d=await(await fetch('data.json?'+Date.now())).json();
    const pnl=d.portfolio-d.deposit;
    const up=pnl>=0;
    document.getElementById('content').innerHTML=`
      <div class="box">
        <div class="row big"><span class="l">Portfolio</span><span class="v">$${fm(d.portfolio)}</span></div>
        <div class="row"><span class="l">P&L</span><span class="v ${up?'up':'dn'}">${up?'+':''}$${fm(pnl)} (${(pnl/d.deposit*100).toFixed(1)}%)</span></div>
      </div>
      <div class="box">
        <div class="row"><span class="l">Wallet</span><span class="v">$${fm(d.wallet)}</span></div>
        <div class="row"><span class="l">In Positions</span><span class="v">$${fm(d.portfolio-d.wallet)}</span></div>
        <div class="row"><span class="l">Deposit</span><span class="v">$${fm(d.deposit)}</span></div>
      </div>`;
    document.getElementById('upd').textContent='Updated '+new Date(d.updated).toLocaleString();
  }catch(e){}
}
load();setInterval(load,60000);
</script>
</body>
</html>
