<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
header{border-bottom:1px solid #1e2a3a;padding:20px 0}
header .inner{max-width:900px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:700}
header nav{font-size:13px}
header nav a{color:#3b82f6;text-decoration:none;margin-left:16px}
.badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:99px;background:rgba(16,185,129,.12);color:#10b981;margin-left:8px}
main{max-width:900px;margin:0 auto;padding:24px 20px 60px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filters button{background:#1e2a3a;border:none;color:#8892a4;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.filters button.active{background:#3b82f6;color:#fff}
.stats{font-size:12px;color:#8892a4;margin-bottom:16px}
.entry{padding:10px 14px;margin-bottom:6px;border-radius:6px;font-size:13px;line-height:1.6;border-left:3px solid transparent}
.entry .ts{font-size:11px;color:#555;font-family:'JetBrains Mono',monospace}
.entry .market{font-weight:500;color:#e2e8f0;margin-top:2px}
.entry .detail{color:#8892a4;font-size:12px;margin-top:2px}
.entry .rationale{color:#c9d1d9;font-size:12px;margin-top:6px;line-height:1.5;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:4px}
.tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 6px;border-radius:3px;margin-right:6px}

.entry.considered{border-color:#3b82f6;background:rgba(59,130,246,.05)}
.tag.considered{background:rgba(59,130,246,.15);color:#60a5fa}

.entry.rejected{border-color:#ef4444;background:rgba(239,68,68,.05)}
.tag.rejected{background:rgba(239,68,68,.15);color:#f87171}

.entry.executed{border-color:#8b5cf6;background:rgba(139,92,246,.05)}
.tag.executed{background:rgba(139,92,246,.15);color:#a78bfa}

.entry.unwound{border-color:#f59e0b;background:rgba(245,158,11,.05)}
.tag.unwound{background:rgba(245,158,11,.15);color:#fbbf24}

.entry.legacy{border-color:#374151;background:rgba(55,65,81,.05)}
.tag.legacy{background:rgba(55,65,81,.35);color:#9ca3af}

.strat{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:3px;margin-right:4px}
.strat.sweep{background:rgba(16,185,129,.15);color:#10b981}
.strat.arb{background:rgba(251,191,36,.15);color:#fbbf24}
.strat.copy{background:rgba(96,165,250,.15);color:#60a5fa}

.pnl-pos{color:#10b981}
.pnl-neg{color:#ef4444}

footer{text-align:center;padding:20px;font-size:10px;color:#555;border-top:1px solid #1e2a3a;margin-top:40px}
#entries{min-height:200px}
.empty{color:#555;text-align:center;padding:40px}
</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>Ermis Agent <span class="badge">Live</span></h1>
    <nav>
      <a href="https://polymarket.com/portfolio" target="_blank">Portfolio</a>
    </nav>
  </div>
</header>
<main>
  <h2 style="font-size:16px;margin-bottom:16px">Decision Journal</h2>
  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="considered">Considered</button>
    <button data-filter="rejected">Rejected</button>
    <button data-filter="executed">Executed</button>
    <button data-filter="sweep">Sweep</button>
    <button data-filter="arb">Arb</button>
    <button data-filter="legacy">Legacy</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="entries"></div>
</main>
<footer>Ermis — Autonomous prediction market agent</footer>
<script>
let allEntries = [];
let activeFilter = 'all';

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function fmtTime(ts){
  try{const d=new Date(ts);return d.toLocaleString('en-GB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}
  catch(e){return ts||''}
}

// Classify each raw entry into a display category
function classify(e){
  switch(e.type){
    case 'sweep_considered': return {cat:'considered',strat:'sweep'};
    case 'sweep_rejected':   return {cat:'rejected',  strat:'sweep'};
    case 'sweep_buy':        return {cat:'executed',  strat:'sweep'};
    case 'arb_considered':   return {cat:'considered',strat:'arb'};
    case 'arb_rejected':     return {cat:'rejected',  strat:'arb'};
    case 'arb_execute':
      return e.status==='partial_unwind'
        ? {cat:'unwound', strat:'arb'}
        : {cat:'executed',strat:'arb'};
    case 'copy_buy':
    case 'copy_sell':
    case 'copy_skip':        return {cat:'legacy',    strat:'copy'};
    default:                 return {cat:'legacy',    strat:'copy'};
  }
}

function renderDetail(e){
  switch(e.type){
    case 'sweep_considered':
      return `${esc(e.outcome)} · price ${e.price} · return ${esc(e.return_pct)} · ${esc(e.data_source)} (conf ${e.confidence}) · expires in ${e.hours_to_expiry}h`;
    case 'sweep_rejected':
      return `<span style="color:#f87171">${esc(e.reason)}</span>${e.price ? ' · price '+e.price : ''}`;
    case 'sweep_buy':
      return `${esc(e.outcome)} · ${esc(e.size)} @ ${e.price} · profit ${esc(e.expected_profit)} (${esc(e.return_pct)}) · ${esc(e.data_source)}${e.paper?' · <span style="color:#fbbf24">PAPER</span>':''}`;
    case 'arb_considered':
      return `${esc(e.arb_type)} · ${e.legs} legs · gross ${esc(e.gross_pct)} · net ${esc(e.net_pct)}`;
    case 'arb_rejected':
      return `${esc(e.arb_type)} · <span style="color:#f87171">${esc(e.reason)}</span>`;
    case 'arb_execute':
      const sc = e.status==='filled'?'pnl-pos':e.status==='partial_unwind'?'pnl-neg':'';
      return `${esc(e.arb_type)} · ${e.legs} legs · cost ${esc(e.total_cost)} → payout ${esc(e.expected_payout)} · <span class="${sc}">${esc(e.status)}</span>`;
    case 'copy_buy':
      return `copied ${esc(e.wallet)} · ${esc(e.size)} @ ${e.entry} · payout ${esc(e.potential_payout)}`;
    case 'copy_sell':
      return `copied ${esc(e.wallet)} · ${esc(e.shares)} shares · ${e.entry}→${e.exit} · <span class="${e.pnl&&e.pnl.startsWith('-')?'pnl-neg':'pnl-pos'}">${esc(e.pnl)}</span>`;
    case 'copy_skip':
      return `skipped ${esc(e.wallet)} · ${esc(e.reason)}`;
    default:
      return '';
  }
}

function renderEntry(e){
  const {cat, strat} = classify(e);
  const market = e.market || e.market_id || '';
  const detail = renderDetail(e);
  if(!detail) return '';

  return `<div class="entry ${cat}">
    <span class="strat ${strat}">${strat.toUpperCase()}</span><span class="tag ${cat}">${cat.toUpperCase()}</span><span class="ts">${fmtTime(e.ts)}</span>
    <div class="market">${esc(market)}</div>
    <div class="detail">${detail}</div>
    ${e.rationale ? `<div class="rationale">${esc(e.rationale)}</div>` : ''}
  </div>`;
}

function matchesFilter(e){
  if(activeFilter === 'all') return true;
  const {cat, strat} = classify(e);
  if(activeFilter === 'sweep') return strat === 'sweep';
  if(activeFilter === 'arb')   return strat === 'arb';
  if(activeFilter === 'legacy')return strat === 'copy';
  return cat === activeFilter;
}

let filteredCache = [];
let renderedCount = 0;
const PAGE_SIZE = 50;

function applyFilter(){
  filteredCache = allEntries.filter(matchesFilter).slice().reverse();
  renderedCount = 0;
}

function renderMore(){
  const el = document.getElementById('entries');
  const batch = filteredCache.slice(renderedCount, renderedCount + PAGE_SIZE);
  if(!batch.length && !renderedCount){
    el.innerHTML = '<div class="empty">No entries yet. Agent is running.</div>';
    return;
  }
  const html = batch.map(renderEntry).filter(Boolean).join('');
  if(!renderedCount) el.innerHTML = html || '<div class="empty">No entries match this filter.</div>';
  else el.insertAdjacentHTML('beforeend', html);
  renderedCount += batch.length;
}

function render(){
  applyFilter();
  renderMore();

  // Stats
  const cats = allEntries.map(e => classify(e));
  const count = (f) => cats.filter(f).length;
  const parts = [
    `${count(c=>c.cat==='considered')} considered`,
    `${count(c=>c.cat==='rejected')} rejected`,
    `${count(c=>c.cat==='executed')} executed`,
    `${count(c=>c.strat==='sweep')} sweep`,
    `${count(c=>c.strat==='arb')} arb`,
  ];
  document.getElementById('stats').textContent = parts.filter(p=>!p.startsWith('0 ')).join(' · ');
}

window.addEventListener('scroll',()=>{
  if(renderedCount >= filteredCache.length) return;
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) renderMore();
});

document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

async function load(){
  try{
    const resp = await fetch('journal.jsonl?' + Date.now());
    const text = await resp.text();
    allEntries = text.trim().split('\n').filter(Boolean).map(line=>{
      try{return JSON.parse(line)}catch(e){return null}
    }).filter(Boolean);
    render();
  } catch(e){
    document.getElementById('entries').innerHTML = '<div class="empty">Failed to load journal.</div>';
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
