<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermis Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
header{border-bottom:1px solid #1e2a3a;padding:20px 0}
header .inner{max-width:900px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:700}
header nav{font-size:13px}
header nav a{color:#3b82f6;text-decoration:none;margin-left:16px}
.badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:99px;background:rgba(16,185,129,.12);color:#10b981;margin-left:8px}
main{max-width:900px;margin:0 auto;padding:24px 20px 60px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filters button{background:#1e2a3a;border:none;color:#8892a4;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.filters button.active{background:#3b82f6;color:#fff}
.stats{font-size:12px;color:#8892a4;margin-bottom:16px}
.entry{padding:10px 14px;margin-bottom:6px;border-radius:6px;font-size:13px;line-height:1.6;border-left:3px solid transparent}
.entry .ts{font-size:11px;color:#555;font-family:'JetBrains Mono',monospace}
.entry .market{font-weight:500;color:#e2e8f0}
.entry .detail{color:#8892a4;font-size:12px;margin-top:2px}
.entry .reason{color:#f59e0b;font-size:12px}
.entry .rationale{color:#c9d1d9;font-size:12px;margin-top:6px;line-height:1.5;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:4px}
.entry .reasoning{color:#6b7280;font-size:11px;margin-top:4px;font-style:italic;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.strat-tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 6px;border-radius:3px;margin-right:4px}
.strat-tag.bracket{background:rgba(251,191,36,.15);color:#fbbf24}
.strat-tag.smart_money{background:rgba(96,165,250,.15);color:#60a5fa}
.strat-tag.unknown{background:rgba(107,114,128,.15);color:#9ca3af}
.outcome{margin-top:4px;font-size:12px;padding:2px 0}
.rejected-outcome{color:#f87171}
.approved-outcome{color:#34d399}
.executed-outcome{color:#a78bfa}
.entry.candidate{border-color:#3b82f6;background:rgba(59,130,246,.05)}
.entry.rejected{border-color:#ef4444;background:rgba(239,68,68,.05)}
.entry.approved{border-color:#10b981;background:rgba(16,185,129,.05)}
.entry.executed{border-color:#8b5cf6;background:rgba(139,92,246,.05)}
.entry.cashout{border-color:#f59e0b;background:rgba(245,158,11,.05)}
.entry.hold{border-color:#6b7280;background:rgba(107,114,128,.05)}
.tag{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:3px;margin-right:6px}
.tag.candidate{background:rgba(59,130,246,.15);color:#60a5fa}
.tag.rejected{background:rgba(239,68,68,.15);color:#f87171}
.tag.approved{background:rgba(16,185,129,.15);color:#34d399}
.tag.executed{background:rgba(139,92,246,.15);color:#a78bfa}
.tag.cashout{background:rgba(245,158,11,.15);color:#fbbf24}
.tag.hold{background:rgba(107,114,128,.15);color:#9ca3af}
.pnl-pos{color:#10b981}.pnl-neg{color:#ef4444}
footer{text-align:center;padding:20px;font-size:10px;color:#555;border-top:1px solid #1e2a3a;margin-top:40px}
#entries{min-height:200px}
.empty{color:#555;text-align:center;padding:40px}
</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>Ermis Agent <span class="badge">Live</span></h1>
    <nav>
      <a href="https://polymarket.com/portfolio" target="_blank">Portfolio</a>
    </nav>
  </div>
</header>
<main>
  <h2 style="font-size:16px;margin-bottom:16px">Decision Journal</h2>
  <div class="filters">
    <button class="active" data-type="all">All</button>
    <button data-type="candidate">Considered</button>
    <button data-type="rejected">Rejected</button>
    <button data-type="approved">Approved</button>
    <button data-type="executed">Executed</button>
    <button data-type="cashout">Cashout</button>
    <button data-type="hold">Holding</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="entries"></div>
</main>
<footer>Ermis — Autonomous prediction market agent</footer>
<script>
let allEntries=[];
let activeFilter='all';

function fmtTime(ts){
  try{const d=new Date(ts);return d.toLocaleString('en-GB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}catch(e){return ts}
}

function stratTag(e){
  const s=e.strategy||(e.reasoning&&e.reasoning.startsWith('smart_money')?'smart_money':e.reasoning&&e.reasoning.startsWith('bracket')?'bracket':'');
  if(!s)return '';
  const label=s==='smart_money'?'SMART MONEY':s==='bracket'?'BRACKET':s.toUpperCase();
  return `<span class="strat-tag ${s}">${label}</span>`;
}

function rationaleBlock(e){
  if(e.rationale)return `<div class="rationale">${esc(e.rationale)}</div>`;
  if(e.reasoning)return `<div class="reasoning">${esc(e.reasoning)}</div>`;
  return '';
}

function renderEntry(e){
  const type=e.type||'unknown';
  const ts=fmtTime(e.ts);
  const market=e.market||'';
  let detail='';
  let extra='';
  const strat=stratTag(e);

  switch(type){
    case 'candidate': {
      detail=`${e.side} @ ${(e.entry*100).toFixed(1)}¢ · edge ${e.edge} · ${e.confidence} · ${e.size}`;
      // Merge outcome into same card
      const outcome=e._outcome;
      if(outcome){
        if(outcome.type==='rejected'){
          detail+=`<div class="outcome rejected-outcome">✗ ${esc(outcome.reason)}</div>`;
        } else if(outcome.type==='approved'){
          let appDetail=`✓ Approved`;
          if(outcome.kelly)appDetail+=` · kelly ${outcome.kelly}`;
          if(outcome.portfolio_pct)appDetail+=` · ${outcome.portfolio_pct} of portfolio`;
          if(outcome.potential_payout)appDetail+=` · payout ${outcome.potential_payout}`;
          detail+=`<div class="outcome approved-outcome">${appDetail}</div>`;
          if(outcome._executed){
            const ex=outcome._executed;
            const statusClass=ex.status==='filled'?'pnl-pos':'pnl-neg';
            detail+=`<div class="outcome executed-outcome">⚡ <span class="${statusClass}">${ex.status}</span> · ${ex.size}</div>`;
          }
        }
      }
      // Always show candidate rationale (has wallet details, Poisson stats etc.)
      extra=rationaleBlock(e);
      break;
    }
    case 'rejected':
    case 'approved':
    case 'executed':
      return ''; // Merged into candidate cards
    case 'cashout': {
      const pnlClass=e.pnl&&e.pnl.startsWith('-')?'pnl-neg':'pnl-pos';
      detail=`${e.action}: ${esc(e.reason)} · ${(e.entry*100).toFixed(1)}¢→${(e.current*100).toFixed(1)}¢ · <span class="${pnlClass}">${e.pnl}</span> (${e.dollar_pnl||''}) · ${e.shares} shares`;
      extra=rationaleBlock(e);
      break;
    }
    case 'hold': {
      const hClass=e.pnl&&e.pnl.startsWith('-')?'pnl-neg':'pnl-pos';
      detail=`${(e.entry*100).toFixed(1)}¢→${(e.current*100).toFixed(1)}¢ · <span class="${hClass}">${e.pnl}</span> · ${esc(e.verdict)}`;
      extra=rationaleBlock(e);
      break;
    }
  }
  if(!detail&&!extra)return '';

  // Use outcome type for card styling if merged
  const cardType=e._outcome?e._outcome.type:type;

  return `<div class="entry ${cardType}">
    ${strat}<span class="tag ${cardType}">${cardType==='rejected'?'REJECTED':cardType==='approved'?'APPROVED':type.toUpperCase()}</span>
    <span class="ts">${ts}</span>
    <div class="market">${esc(market)}</div>
    <div class="detail">${detail}</div>
    ${extra}
  </div>`;
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function mergeEntries(entries){
  // Build lookup: market_id+ts_minute → rejected/approved/executed
  const outcomes={};// market_id → {rejected/approved}
  const executed={};// market_id → executed
  for(const e of entries){
    if(e.type==='rejected'||e.type==='approved'){
      const key=e.market_id||e.market;
      if(!outcomes[key])outcomes[key]=e;
    }
    if(e.type==='executed'){
      const key=e.market_id||e.market;
      if(!executed[key])executed[key]=e;
    }
  }
  // Attach outcomes to candidates
  for(const e of entries){
    if(e.type==='candidate'){
      const key=e.market_id||e.market;
      if(outcomes[key])e._outcome=outcomes[key];
      if(e._outcome&&e._outcome.type==='approved'&&executed[key]){
        e._outcome._executed=executed[key];
      }
    }
  }
  return entries;
}

let filteredCache=[];
let renderedCount=0;
const PAGE_SIZE=50;

function applyFilter(){
  mergeEntries(allEntries);
  if(activeFilter==='all'){
    filteredCache=allEntries.filter(e=>e.type!=='rejected'&&e.type!=='approved'&&e.type!=='executed');
  } else if(activeFilter==='candidate'){
    filteredCache=allEntries.filter(e=>e.type==='candidate');
  } else if(activeFilter==='rejected'){
    filteredCache=allEntries.filter(e=>e.type==='candidate'&&e._outcome&&e._outcome.type==='rejected');
  } else if(activeFilter==='approved'){
    filteredCache=allEntries.filter(e=>e.type==='candidate'&&e._outcome&&e._outcome.type==='approved');
  } else if(activeFilter==='executed'){
    filteredCache=allEntries.filter(e=>e.type==='candidate'&&e._outcome&&e._outcome._executed);
  } else {
    filteredCache=allEntries.filter(e=>e.type===activeFilter);
  }
  filteredCache=filteredCache.slice().reverse();
  renderedCount=0;
}

function renderMore(){
  const el=document.getElementById('entries');
  const batch=filteredCache.slice(renderedCount,renderedCount+PAGE_SIZE);
  if(!batch.length&&!renderedCount){el.innerHTML='<div class="empty">No entries yet. Agent is running.</div>';return}
  const html=batch.map(renderEntry).join('');
  if(!renderedCount)el.innerHTML=html;
  else el.insertAdjacentHTML('beforeend',html);
  renderedCount+=batch.length;
}

function render(){
  applyFilter();
  renderMore();
  // Stats — count from merged cards, not raw entries
  const c=allEntries.filter(e=>e.type==='candidate');
  const nRejected=c.filter(e=>e._outcome&&e._outcome.type==='rejected').length;
  const nApproved=c.filter(e=>e._outcome&&e._outcome.type==='approved').length;
  const nExecuted=c.filter(e=>e._outcome&&e._outcome._executed).length;
  const nCashout=allEntries.filter(e=>e.type==='cashout').length;
  const nHold=allEntries.filter(e=>e.type==='hold').length;
  const parts=[`${c.length} evaluated`,`${nRejected} rejected`,`${nApproved} approved`,`${nExecuted} executed`,`${nCashout} cashout`,`${nHold} hold`];
  document.getElementById('stats').textContent=parts.filter(p=>!p.startsWith('0 ')).join(' · ');
}

// Infinite scroll — load more when near bottom
window.addEventListener('scroll',()=>{
  if(renderedCount>=filteredCache.length)return;
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-300){
    renderMore();
  }
});

document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.type;
    render();
  });
});

async function load(){
  try{
    const resp=await fetch('journal.jsonl?'+Date.now());
    const text=await resp.text();
    allEntries=text.trim().split('\n').filter(Boolean).map(line=>{
      try{return JSON.parse(line)}catch(e){return null}
    }).filter(Boolean);
    render();
  }catch(e){
    document.getElementById('entries').innerHTML='<div class="empty">Failed to load journal.</div>';
  }
}
load();
// Auto-refresh every 60s
setInterval(load,60000);
</script>
</body>
</html>
